name: Deploy to IPFS via Filebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build

      - name: Deploy to IPFS
        uses: ipshipyard/ipfs-deploy-action@v1
        with:
          path: ./out         
          filebase-bucket: ${{ secrets.FILEBASE_BUCKET }}
          filebase-access-key: ${{ secrets.FILEBASE_ACCESS_KEY }}
          filebase-secret-key: ${{ secrets.FILEBASE_SECRET_KEY }}