name: Deploy to IPFS via Filebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify NEXT_PUBLIC_PROJECT_ID
        run: |
          if [ -z "$NEXT_PUBLIC_PROJECT_ID" ]; then
            echo "Error: NEXT_PUBLIC_PROJECT_ID secret is not set in repository settings"
            exit 1
          fi
          echo "NEXT_PUBLIC_PROJECT_ID is configured"

      - name: Build static site
        run: pnpm run build

      - name: Deploy to IPFS via Filebase
        uses: aquiladev/ipfs-action@v0.3.1
        with:
          path: ./out
          service: filebase
          filebaseBucket: ${{ secrets.FILEBASE_BUCKET }}
          filebaseKey: ${{ secrets.FILEBASE_ACCESS_KEY }}
          filebaseSecret: ${{ secrets.FILEBASE_SECRET_KEY }}